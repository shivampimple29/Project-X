version: "3.1"

rules:
- rule: Greet user
  steps:
  - intent: greet
  - action: utter_greet

- rule: Say goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Thank user
  steps:
  - intent: thank
  - action: utter_thank

- rule: Help
  steps:
  - intent: help
  - action: utter_help

- rule: Default fallback
  steps:
  - intent: nlu_fallback
  - action: utter_default